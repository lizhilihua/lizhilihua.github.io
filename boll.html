<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 彩色交互足球-移动适配版</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #050505; 
            /* 防止移动端浏览器下拉刷新和缩放干扰 */
            touch-action: none; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        #ui-layer { 
            position: absolute; 
            bottom: 40px; /* 移动端按钮放在底部更易操作 */
            left: 50%; 
            transform: translateX(-50%);
            z-index: 10; 
            width: 80%;
            text-align: center;
        }
        
        button { 
            width: 100%;
            max-width: 280px;
            padding: 16px 20px; 
            cursor: pointer; 
            background: rgba(255,255,255,0.15); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.4); 
            border-radius: 40px;
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); /* iOS 适配 */
            transition: all 0.3s; 
            font-size: 16px; /* 移动端字体不能太小 */
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            outline: none;
            -webkit-tap-highlight-color: transparent; /* 去除点击高亮蓝框 */
        }
        
        button:active { 
            background: rgba(255,255,255,0.4); 
            transform: scale(0.95); 
        }

        .label-container {
            position: absolute; 
            top: 20px; /* 移动端信息面板放在顶部中心 */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); 
            color: #fff;
            padding: 15px; 
            border-radius: 15px; 
            border-bottom: 4px solid #fff;
            pointer-events: none; 
            display: none; 
            width: 70%;
            max-width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 20;
        }

        #info-content {
            font-size: 14px;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <button id="action-btn">发射 / 组装板块</button>
</div>

<div id="info-panel" class="label-container">
    <div id="info-color-box" style="width:100%; height:8px; border-radius:4px; margin-bottom:10px;"></div>
    <div id="info-content"></div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "@tweenjs/tween.js": "https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import * as TWEEN from '@tweenjs/tween.js'; 

    let scene, camera, renderer, controls, group;
    let isExploded = false;
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        // 移动端视野范围适当调宽
        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = window.innerWidth < 600 ? 45 : 35; // 手机端距离拉远一点

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 限制像素比优化性能
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.PointLight(0xffffff, 2);
        camera.add(light);
        scene.add(camera);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.rotateSpeed = 0.8; // 调低一点让手机旋转更丝滑

        group = new THREE.Group();
        scene.add(group);

        createColorfulSoccer();

        // 统一处理点击和触摸
        const actionBtn = document.getElementById('action-btn');
        actionBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleExplode();
        });

        // 监听渲染器容器的交互
        renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: false });
        window.addEventListener('resize', onWindowResize);
    }

    function createColorfulSoccer() {
        const baseGeom = new THREE.IcosahedronGeometry(10, 1);
        const posAttr = baseGeom.getAttribute('position');
        
        for (let i = 0; i < posAttr.count; i += 3) {
            const v1 = new THREE.Vector3().fromBufferAttribute(posAttr, i);
            const v2 = new THREE.Vector3().fromBufferAttribute(posAttr, i + 1);
            const v3 = new THREE.Vector3().fromBufferAttribute(posAttr, i + 2);
            
            const center = new THREE.Vector3().add(v1).add(v2).add(v3).divideScalar(3);
            const normal = center.clone().normalize();

            const color = new THREE.Color();
            color.setHSL((i / posAttr.count), 0.7, 0.5);

            const geometry = new THREE.BufferGeometry().setFromPoints([v1, v2, v3]);
            geometry.computeVertexNormals();

            const material = new THREE.MeshPhongMaterial({
                color: color,
                transparent: true,
                opacity: 0.9,
                shininess: 80,
                side: THREE.DoubleSide
            });

            const mesh = new THREE.Mesh(geometry, material);
            
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ 
                color: color.clone().offsetHSL(0, 0, 0.2),
                transparent: true,
                opacity: 0.5
            }));
            mesh.add(line);

            mesh.userData = {
                normal: normal,
                colorStr: `RGB(${Math.round(color.r*255)}, ${Math.round(color.g*255)}, ${Math.round(color.b*255)})`,
                hex: color.getStyle()
            };
            
            group.add(mesh);
        }
    }

    function onTouchStart(event) {
        // 获取触摸点坐标适配 raycaster
        const touch = event.touches[0];
        mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(group.children);

        if (intersects.length > 0) {
            const target = intersects[0].object;
            const panel = document.getElementById('info-panel');
            
            panel.style.display = 'block';
            panel.style.borderBottomColor = target.userData.hex;
            document.getElementById('info-color-box').style.backgroundColor = target.userData.hex;
            document.getElementById('info-content').innerText = `选中板块色值: ${target.userData.colorStr}`;
            
            // 3秒后自动隐藏面板
            clearTimeout(window.infoTimer);
            window.infoTimer = setTimeout(() => { panel.style.display = 'none'; }, 3000);
        }
    }

    function toggleExplode() {
        isExploded = !isExploded;
        group.children.forEach((mesh) => {
            const targetPos = isExploded 
                ? mesh.userData.normal.clone().multiplyScalar(10) 
                : new THREE.Vector3(0, 0, 0);

            new TWEEN.Tween(mesh.position)
                .to(targetPos, 800)
                .easing(TWEEN.Easing.Quadratic.Out)
                .start();

            new TWEEN.Tween(mesh.rotation)
                .to({
                    x: isExploded ? Math.random() * 4 : 0,
                    y: isExploded ? Math.random() * 4 : 0
                }, 800)
                .start();
        });
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.position.z = window.innerWidth < 600 ? 45 : 35;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate(time) {
        requestAnimationFrame(animate);
        TWEEN.update(time);
        if(!isExploded) group.rotation.y += 0.005;
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
