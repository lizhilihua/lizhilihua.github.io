<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D 彩色交互足球</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; }
        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 10; }
        button { 
            padding: 12px 24px; cursor: pointer; background: rgba(255,255,255,0.1); 
            color: white; border: 1px solid rgba(255,255,255,0.5); border-radius: 30px;
            backdrop-filter: blur(10px); transition: all 0.3s; font-size: 14px;
        }
        button:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .label-container {
            position: absolute; background: rgba(0, 0, 0, 0.8); color: #fff;
            padding: 12px; border-radius: 8px; border-left: 5px solid #fff;
            pointer-events: none; display: none; font-family: monospace;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <button onclick="toggleExplode()">发射 / 组装板块</button>
</div>

<div id="info-panel" class="label-container">
    <div id="info-color-box" style="width:100%; height:10px; margin-bottom:10px;"></div>
    <div id="info-content"></div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "@tweenjs/tween.js": "https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import * as TWEEN from '@tweenjs/tween.js'; 

    let scene, camera, renderer, controls, group;
    let isExploded = false;
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 35;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 环境光和主灯光
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.PointLight(0xffffff, 1.5);
        camera.add(light);
        scene.add(camera);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        group = new THREE.Group();
        scene.add(group);

        createColorfulSoccer();

        window.addEventListener('click', onMouseClick);
        window.addEventListener('resize', onWindowResize);
    }

    function createColorfulSoccer() {
        // 足球基础几何：二十面体细分
        const baseGeom = new THREE.IcosahedronGeometry(10, 1);
        const posAttr = baseGeom.getAttribute('position');
        
        for (let i = 0; i < posAttr.count; i += 3) {
            const v1 = new THREE.Vector3().fromBufferAttribute(posAttr, i);
            const v2 = new THREE.Vector3().fromBufferAttribute(posAttr, i + 1);
            const v3 = new THREE.Vector3().fromBufferAttribute(posAttr, i + 2);
            
            const center = new THREE.Vector3().add(v1).add(v2).add(v3).divideScalar(3);
            const normal = center.clone().normalize();

            // --- 核心修改：生成不同的 RGB 颜色 ---
            // 我们使用 HSL 来生成均匀分布的彩虹色
            // i / posAttr.count 确保颜色随索引在色轮上旋转
            const color = new THREE.Color();
            const hue = (i / posAttr.count); // 色相 (0-1)
            color.setHSL(hue, 0.8, 0.5); // 饱和度 80%, 亮度 50%

            const geometry = new THREE.BufferGeometry().setFromPoints([v1, v2, v3]);
            geometry.computeVertexNormals();

            // 使用生成的 RGB 颜色创建材质
            const material = new THREE.MeshPhongMaterial({
                color: color,
                transparent: true,
                opacity: 0.9,
                shininess: 100,
                side: THREE.DoubleSide
            });

            const mesh = new THREE.Mesh(geometry, material);
            
            // 边缘描边：使用比面颜色稍亮的颜色
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ 
                color: color.clone().offsetHSL(0, 0, 0.2) 
            }));
            mesh.add(line);

            mesh.userData = {
                normal: normal,
                colorStr: `RGB(${Math.round(color.r*255)}, ${Math.round(color.g*255)}, ${Math.round(color.b*255)})`,
                hex: color.getStyle()
            };
            
            group.add(mesh);
        }
    }

    function onMouseClick(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(group.children);

        if (intersects.length > 0) {
            const target = intersects[0].object;
            const panel = document.getElementById('info-panel');
            panel.style.display = 'block';
            panel.style.left = event.clientX + 'px';
            panel.style.top = event.clientY + 'px';
            panel.style.borderLeftColor = target.userData.hex;
            
            document.getElementById('info-color-box').style.backgroundColor = target.userData.hex;
            document.getElementById('info-content').innerText = `板块色值: \n${target.userData.colorStr}`;
        }
    }

    window.toggleExplode = function() {
        isExploded = !isExploded;
        group.children.forEach((mesh) => {
            const targetPos = isExploded 
                ? mesh.userData.normal.clone().multiplyScalar(8) 
                : new THREE.Vector3(0, 0, 0);

            new TWEEN.Tween(mesh.position)
                .to(targetPos, 1000)
                .easing(TWEEN.Easing.Back.Out)
                .start();

            // 额外效果：分解时旋转每个独立板块
            new TWEEN.Tween(mesh.rotation)
                .to({
                    x: isExploded ? Math.random() * 5 : 0,
                    y: isExploded ? Math.random() * 5 : 0
                }, 1000)
                .start();
        });
    };

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate(time) {
        requestAnimationFrame(animate);
        TWEEN.update(time);
        if(!isExploded) group.rotation.y += 0.005;
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
