<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB 解析器 - 纯净版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --primary: #0071e3; --bg: #f5f5f7; --text: #1d1d1f; --border: #d2d2d7; --danger: #ff3b30; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 600px; text-align: center; margin-bottom: 20px; }
        h2 { margin: 0 0 10px; font-weight: 600; }
        .drop-area { border: 2px dashed var(--border); border-radius: 12px; padding: 30px; transition: all 0.3s; cursor: pointer; position: relative; margin-bottom: 15px; }
        .drop-area:hover { border-color: var(--primary); background: #f0f7ff; }
        input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        #chapterList { width: 100%; max-width: 600px; background: white; border-radius: 15px; overflow: hidden; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 40px; }
        .chapter-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #eee; }
        .chapter-title { font-size: 14px; font-weight: 500; cursor: pointer; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .actions { display: flex; gap: 8px; }
        .btn-sm { border: none; padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .view-btn { background: #e8f2ff; color: var(--primary); }
        .del-btn { background: #fff1f0; color: var(--danger); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 85%; max-width: 700px; height: 80vh; border-radius: 20px; display: flex; flex-direction: column; }
        .modal-header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { flex: 1; padding: 25px; overflow-y: auto; white-space: pre-wrap; line-height: 1.8; background: #fafafa; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>EPUB 提取器</h2>
    <div class="drop-area" id="dropArea">
        <span>点击或拖拽 EPUB 文件</span>
        <input type="file" id="epubInput" accept=".epub">
    </div>
    <div id="status">准备就绪</div>
    <button class="btn" id="dlBtn">导出规范格式 TXT</button>
</div>

<div id="chapterList"></div>

<div class="modal" id="previewModal">
    <div class="modal-content">
        <div class="modal-header">
            <strong id="modalTitle"></strong>
            <button class="btn-sm" onclick="document.getElementById('previewModal').style.display='none'">关闭</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
    let chaptersData = [];

    document.getElementById('epubInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        chaptersData = [];
        document.getElementById('status').innerText = "解析中...";
        
        try {
            const zip = await JSZip.loadAsync(file);
            let opfPath = "";
            zip.forEach(path => { if (path.endsWith('.opf')) opfPath = path; });
            
            const opfContent = await zip.file(opfPath).async("string");
            const chapterPaths = parseOpf(opfContent, opfPath);
            const parser = new DOMParser();

            for (let path of chapterPaths) {
                const entry = zip.file(path);
                if (!entry) continue;

                const html = await entry.async("string");
                const doc = parser.parseFromString(html, 'text/html');

                // 1. 提取标题
                let titleEl = doc.querySelector('h1, h2, h3, .title, .chapter-title');
                let title = titleEl ? titleEl.innerText.trim() : "未命名章节";
                title = title.replace(/[\r\n\t]+/g, ' ');

                // 2. 提取正文并去重（排除标题标签）
                // 只选择 p 标签或特定的内容容器，同时排除掉刚才已经作为标题的标签
                const pElements = Array.from(doc.querySelectorAll('p'));
                
                let contentArr = pElements
                    .map(p => p.innerText.trim())
                    .filter(text => {
                        // 过滤掉：空行、以及内容完全等于标题的行（防止重复）
                        return text.length > 0 && text !== title;
                    });

                // 3. 规范化内容格式：每段前加两个全角空格
                const formattedContent = contentArr.map(line => `　　${line}`).join('\n\n');

                if (formattedContent.length > 10) {
                    chaptersData.push({ title, content: formattedContent });
                }
            }
            renderList();
        } catch (err) {
            document.getElementById('status').innerText = "解析失败";
        }
    });

    function parseOpf(xmlStr, opfPath) {
        const xml = new DOMParser().parseFromString(xmlStr, "text/xml");
        const idMap = {};
        Array.from(xml.getElementsByTagName("item")).forEach(it => idMap[it.getAttribute("id")] = it.getAttribute("href"));
        const baseDir = opfPath.substring(0, opfPath.lastIndexOf('/') + 1);
        return Array.from(xml.getElementsByTagName("itemref"))
            .map(ref => baseDir + idMap[ref.getAttribute("idref")])
            .map(p => p.replace(/[^\/]+\/\.\.\//g, ""));
    }

    function renderList() {
        const list = document.getElementById('chapterList');
        list.innerHTML = "";
        chaptersData.forEach((ch, i) => {
            const div = document.createElement('div');
            div.className = 'chapter-item';
            div.innerHTML = `
                <div class="chapter-title" onclick="openPreview(${i})">${i+1}. ${ch.title}</div>
                <div class="actions">
                    <button class="btn-sm view-btn" onclick="openPreview(${i})">预览</button>
                    <button class="btn-sm del-btn" onclick="deleteCh(${i})">删除</button>
                </div>`;
            list.appendChild(div);
        });
        list.style.display = chaptersData.length ? "block" : "none";
        document.getElementById('dlBtn').style.display = chaptersData.length ? "block" : "none";
        document.getElementById('status').innerText = `已加载 ${chaptersData.length} 章`;
    }

    window.openPreview = (i) => {
        document.getElementById('modalTitle').innerText = chaptersData[i].title;
        document.getElementById('modalBody').innerText = chaptersData[i].content;
        document.getElementById('previewModal').style.display = 'flex';
    };

    window.deleteCh = (i) => {
        chaptersData.splice(i, 1);
        renderList();
    };

    document.getElementById('dlBtn').onclick = () => {
        // 导出最终格式：标题顶格 + 两个回车 + 内容(自带缩进和单空行) + 章节间三个回车
        const output = chaptersData.map(c => `${c.title}\n\n${c.content}`).join('\n\n\n');
        const blob = new Blob([output], { type: "text/plain;charset=utf-8" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `书籍导出_${Date.now()}.txt`;
        a.click();
    };
</script>
</body>
</html>
