<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Epub 修改章节名</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --primary: #007aff; --success: #34c759; --bg: #f2f2f7; --sidebar: 280px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { height: 60px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 15px; gap: 10px; border-bottom: 0.5px solid #d1d1d6; z-index: 100; }
        .btn { border: none; padding: 8px 15px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #e5e5ea; color: #1c1c1e; }
        
        main { flex: 1; display: flex; position: relative; overflow: hidden; }
        #toc-sidebar { width: var(--sidebar); background: #fff; border-right: 0.5px solid #d1d1d6; overflow-y: auto; transition: 0.3s; z-index: 60; }
        .toc-item { padding: 12px; border-bottom: 0.5px solid #f2f2f7; display: flex; flex-direction: column; gap: 5px; }
        .toc-item input { border: 1px solid #eee; padding: 6px; border-radius: 4px; font-size: 14px; width: 100%; outline: none; background: #fafafa; }
        .toc-item input:focus { border-color: var(--primary); background: #fff; }
        
        #reader-container { flex: 1; background: white; overflow-y: auto; padding: 30px 20px; }
        #reader-content { max-width: 700px; margin: 0 auto; line-height: 1.8; font-size: 17px; }

        @media (max-width: 768px) {
            #toc-sidebar { position: absolute; transform: translateX(-100%); }
            #toc-sidebar.active { transform: translateX(0); }
            .sidebar-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: none; z-index: 50; }
            .sidebar-overlay.active { display: block; }
        }
    </style>
</head>
<body>

<header>
    <button class="btn btn-secondary" onclick="toggleMenu()">☰ 目录</button>
    <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">导入</button>
    <button id="copy-btn" class="btn btn-secondary" onclick="copyText()" style="display:none">复制全文</button>
    <div style="flex:1"></div>
    <button class="btn btn-primary" onclick="exportEpub()">导出 EPUB</button>
    <input type="file" id="fileInput" accept=".epub" style="display:none">
</header>

<main>
    <div class="sidebar-overlay" onclick="toggleMenu()"></div>
    <div id="toc-sidebar">
        <div id="toc-list" style="padding:10px; color:#999; text-align:center; overflow: calc(100vh - 100px); overflow: scroll;">等待导入...</div>
    </div>
    <div id="reader-container">
        <div id="reader-content">点击目录查看章节内容</div>
    </div>
</main>

<script>
    let zip = null;
    let opfPath = "";
    let navPath = "";
    let tocEntries = []; // 存储 { title, href, isEPUB3 }

    function toggleMenu() {
        document.getElementById('toc-sidebar').classList.toggle('active');
        document.querySelector('.sidebar-overlay').classList.toggle('active');
    }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        zip = await JSZip.loadAsync(await file.arrayBuffer());

        // 1. 定位 OPF
        const container = await zip.file("META-INF/container.xml").async("text");
        const containerDoc = new DOMParser().parseFromString(container, "text/xml");
        opfPath = containerDoc.querySelector("rootfile").getAttribute("full-path");
        const baseDir = opfPath.substring(0, opfPath.lastIndexOf("/") + 1);

        // 2. 定位导航文件
        const opfStr = await zip.file(opfPath).async("text");
        const opfDoc = new DOMParser().parseFromString(opfStr, "text/xml");
        const navItem = opfDoc.querySelector('item[properties~="nav"]') || opfDoc.querySelector('item[id="ncx"]');
        
        if (navItem) {
            navPath = baseDir + navItem.getAttribute("href");
            await loadToc(navPath);
        }
    });

    async function loadToc(path) {
        const content = await zip.file(path).async("text");
        const doc = new DOMParser().parseFromString(content, "text/xml");
        const list = document.getElementById('toc-list');
        list.innerHTML = "";
        tocEntries = [];

        // 判断版本并抓取
        let isEPUB3 = doc.querySelector('nav') !== null;
        let items = isEPUB3 ? doc.querySelectorAll('nav a') : doc.querySelectorAll('navPoint');

        items.forEach((node, i) => {
            let title = isEPUB3 ? node.textContent : node.querySelector('text').textContent;
            let href = isEPUB3 ? node.getAttribute('href') : node.querySelector('content').getAttribute('src');
            
            const div = document.createElement('div');
            div.className = 'toc-item';
            const input = document.createElement('input');
            input.value = title.trim();
            input.oninput = (e) => { tocEntries[i].newTitle = e.target.value; };
            
            const viewLink = document.createElement('div');
            viewLink.innerHTML = `<small style="color:var(--primary); cursor:pointer">查看章节 →</small>`;
            viewLink.onclick = () => { loadChapter(href); if(window.innerWidth < 768) toggleMenu(); };

            div.append(input, viewLink);
            list.appendChild(div);
            tocEntries.push({ originalTitle: title, newTitle: title, href, isEPUB3 });
        });
    }

    async function loadChapter(href) {
        const baseDir = opfPath.substring(0, opfPath.lastIndexOf("/") + 1);
        const path = baseDir + href.split('#')[0];
        const html = await zip.file(path).async("text");
        const body = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
        document.getElementById('reader-content').innerHTML = body ? body[1] : html;
        document.getElementById('copy-btn').style.display = 'block';
        document.getElementById('reader-container').scrollTop = 0;
    }

    function copyText() {
        const text = document.getElementById('reader-content').innerText;
        navigator.clipboard.writeText(text).then(() => alert("已复制到剪贴板"));
    }

    // --- 核心：真正修改并导出 ---
    async function exportEpub() {
        if (!zip) return;

        // 1. 读取原始导航文件
        const navContent = await zip.file(navPath).async("text");
        const navDoc = new DOMParser().parseFromString(navContent, "text/xml");

        // 2. 根据用户输入修改 DOM
        tocEntries.forEach(entry => {
            if (entry.newTitle !== entry.originalTitle) {
                if (entry.isEPUB3) {
                    // EPUB3: 修改 <a> 标签内容
                    const a = navDoc.querySelector(`a[href="${entry.href}"]`);
                    if (a) a.textContent = entry.newTitle;
                } else {
                    // EPUB2: 修改 <navPoint> 下的 <text>
                    const points = navDoc.querySelectorAll('navPoint');
                    points.forEach(p => {
                        if(p.querySelector('content').getAttribute('src') === entry.href) {
                            p.querySelector('text').textContent = entry.newTitle;
                        }
                    });
                }
            }
        });

        // 3. 将修改后的 XML 写回 ZIP
        const serializer = new XMLSerializer();
        zip.file(navPath, serializer.serializeToString(navDoc));

        // 4. 打包并下载
        const name = prompt("导出文件名:", "Modified_Book") || "book";
        const blob = await zip.generateAsync({type:"blob"});
        saveAs(blob, name + ".epub");
    }
</script>
</body>
</html>
