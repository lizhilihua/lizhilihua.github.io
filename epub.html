<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB 解析器 - TXT 规范导出版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --primary: #0071e3; --bg: #f5f5f7; --text: #1d1d1f; --border: #d2d2d7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 600px; text-align: center; margin-bottom: 20px; }
        h2 { margin: 0 0 10px; font-weight: 600; }
        p.subtitle { color: #888; font-size: 14px; margin-bottom: 20px; }
        
        .drop-area { border: 2px dashed var(--border); border-radius: 12px; padding: 30px; transition: all 0.3s; cursor: pointer; position: relative; margin-bottom: 15px; }
        .drop-area:hover { border-color: var(--primary); background: #f0f7ff; }
        input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }

        #chapterList { width: 100%; max-width: 600px; background: white; border-radius: 15px; overflow: hidden; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 40px; }
        .chapter-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #eee; }
        .chapter-title { font-size: 14px; font-weight: 500; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; text-align: left; }
        .view-btn { background: #e8f2ff; color: var(--primary); border: none; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-left: 10px; }
        
        /* 预览模态框 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 85%; max-width: 700px; height: 80vh; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { flex: 1; padding: 25px; overflow-y: auto; text-align: left; line-height: 1.8; white-space: pre-wrap; font-size: 16px; color: #333; background: #fafafa; }
        .close-modal { font-size: 24px; cursor: pointer; color: #888; border: none; background: none; }

        .btn { background: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; display: none; font-size: 16px; transition: 0.2s; }
        .btn:hover { background: #005bb7; transform: translateY(-1px); }
        #status { margin-top: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>EPUB 提取器</h2>
    <p class="subtitle">自动段落缩进 · 标题单行化 · 规范 TXT 导出</p>
    <div class="drop-area" id="dropArea">
        <span id="promptText">点击或拖拽 EPUB 文件到此处</span>
        <input type="file" id="epubInput" accept=".epub">
    </div>
    <div id="status">准备就绪</div>
    <button class="btn" id="dlBtn">导出规范格式 TXT</button>
</div>

<div id="chapterList"></div>

<div class="modal" id="previewModal">
    <div class="modal-content">
        <div class="modal-header">
            <strong id="modalTitle">章节预览</strong>
            <button class="close-modal" id="closeModal">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
    const epubInput = document.getElementById('epubInput');
    const status = document.getElementById('status');
    const dlBtn = document.getElementById('dlBtn');
    const chapterListDiv = document.getElementById('chapterList');
    const modal = document.getElementById('previewModal');
    const modalBody = document.getElementById('modalBody');
    const modalTitle = document.getElementById('modalTitle');
    const closeModal = document.getElementById('closeModal');

    let chaptersData = []; 

    epubInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        resetUI();
        status.innerText = "正在解压并解析书籍...";
        
        try {
            const zip = await JSZip.loadAsync(file);
            let opfPath = "";
            zip.forEach((path) => { if (path.endsWith('.opf')) opfPath = path; });

            if (!opfPath) throw new Error("未找到 OPF 配置文件");

            const opfContent = await zip.file(opfPath).async("string");
            const chapterPaths = parseOpfOrder(opfContent, opfPath);
            const parser = new DOMParser();
            
            for (let path of chapterPaths) {
                const fileEntry = zip.file(path);
                if (!fileEntry) continue;

                const html = await fileEntry.async("string");
                const doc = parser.parseFromString(html, 'text/html');
                
                // 1. 提取并清洗标题：强制单行化，去除内部换行和多余空格
                let rawTitle = doc.querySelector('h1, h2, h3')?.innerText || 
                               doc.querySelector('title')?.innerText || 
                               path.split('/').pop();
                const cleanTitle = rawTitle.replace(/[\r\n\t]+/g, ' ').replace(/\s+/g, ' ').trim();
                
                // 2. 提取正文并添加全角缩进
                const paragraphs = Array.from(doc.querySelectorAll('p, div'))
                                    .map(el => el.innerText.trim())
                                    .filter(t => t.length > 0);

                // 处理段落：首行加两个全角空格
                const bodyText = paragraphs.map(p => `　　${p}`).join('\n\n');

                if (bodyText.length > 5) {
                    chaptersData.push({ title: cleanTitle, content: bodyText });
                    renderChapterItem(cleanTitle, chaptersData.length - 1);
                }
            }

            status.innerText = `成功解析 ${chaptersData.length} 个章节`;
            dlBtn.style.display = "block";
            chapterListDiv.style.display = "block";

        } catch (err) {
            status.innerText = "解析失败: " + err.message;
            console.error(err);
        }
    });

    function renderChapterItem(title, index) {
        const item = document.createElement('div');
        item.className = 'chapter-item';
        item.innerHTML = `
            <div class="chapter-title">${index + 1}. ${title}</div>
            <button class="view-btn" onclick="openPreview(${index})">预览格式</button>
        `;
        chapterListDiv.appendChild(item);
    }

    window.openPreview = (index) => {
        const data = chaptersData[index];
        modalTitle.innerText = data.title;
        modalBody.innerText = data.content;
        modal.style.display = 'flex';
    };

    closeModal.onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };

    function parseOpfOrder(xmlString, opfPath) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlString, "text/xml");
        const items = Array.from(xml.getElementsByTagName("item"));
        const spine = Array.from(xml.getElementsByTagName("itemref"));
        const baseDir = opfPath.substring(0, opfPath.lastIndexOf('/') + 1);

        const idMap = {};
        items.forEach(item => idMap[item.getAttribute("id")] = item.getAttribute("href"));

        return spine.map(ref => {
            const href = idMap[ref.getAttribute("idref")];
            if(!href) return null;
            let fullPath = baseDir + href;
            // 简单处理相对路径中的 ../
            return fullPath.replace(/[^\/]+\/\.\.\//g, ""); 
        }).filter(p => p !== null);
    }

    function resetUI() {
        chaptersData = [];
        chapterListDiv.innerHTML = "";
        chapterListDiv.style.display = "none";
        dlBtn.style.display = "none";
        status.innerText = "";
    }

    dlBtn.onclick = () => {
        // 导出逻辑：标题单行，内容缩进，章节间空三行
        const fullTxt = chaptersData.map(c => `${c.title}\n\n${c.content}`).join('\n\n\n');
        
        const blob = new Blob([fullTxt], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "规范导出_" + new Date().getTime() + ".txt";
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
    };
</script>

</body>
</html>
