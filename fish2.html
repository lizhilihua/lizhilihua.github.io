<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互式金鱼</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 制作一个水感渐变背景 */
            background: radial-gradient(circle at 50% 50%, #87ceeb 0%, #1e90ff 100%);
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-family: sans-serif;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>

    <div id="info">
        <h3>🐟 你的专属小金鱼</h3>
        <p>• 移动鼠标：金鱼会跟着游动</p>
        <p>• 点击屏幕：产生水泡</p>
    </div>

    <canvas id="pond"></canvas>

    <script>
        const canvas = document.getElementById('pond');
        const ctx = canvas.getContext('2d');
        let width, height;

        // 窗口大小调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 鼠标/触摸位置追踪
        const target = { x: width / 2, y: height / 2 };
        window.addEventListener('mousemove', (e) => {
            target.x = e.clientX;
            target.y = e.clientY;
        });
        window.addEventListener('touchmove', (e) => {
            target.x = e.touches[0].clientX;
            target.y = e.touches[0].clientY;
        });

        // 气泡数组
        const bubbles = [];
        window.addEventListener('click', (e) => {
            for(let i=0; i<3; i++) {
                bubbles.push({
                    x: e.clientX + (Math.random() - 0.5) * 20,
                    y: e.clientY + (Math.random() - 0.5) * 20,
                    size: Math.random() * 5 + 2,
                    speedY: Math.random() * 2 + 1,
                    wobble: Math.random() * Math.PI * 2
                });
            }
        });

        // 金鱼类
        class Goldfish {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.angle = 0;
                this.tailWag = 0;
                this.finWag = 0;
                this.color = '#ff7b00'; // 鲜艳的橙色
                this.secondaryColor = '#ff4d00';
            }

            update() {
                // 计算向目标的距离
                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // 根据距离添加速度（像弹簧一样跟随）
                if (dist > 10) {
                    this.vx += (dx / dist) * 0.4;
                    this.vy += (dy / dist) * 0.4;
                }

                // 阻力/摩擦力
                this.vx *= 0.94;
                this.vy *= 0.94;

                this.x += this.vx;
                this.y += this.vy;

                // 游动速度
                let speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                
                // 平滑旋转角度面向游动方向
                if (speed > 0.5) {
                    let targetAngle = Math.atan2(this.vy, this.vx);
                    // 解决角度跳变问题 (-PI 到 PI)
                    let angleDiff = targetAngle - this.angle;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    this.angle += angleDiff * 0.1; 
                }

                // 根据速度摆动尾巴和鱼鳍
                this.tailWag += speed * 0.15 + 0.05;
                this.finWag += speed * 0.1 + 0.02;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // 阴影
                ctx.shadowColor = 'rgba(0,0,0,0.2)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetX = 5;
                ctx.shadowOffsetY = 15;

                // 画尾巴 (分两部分让动画更自然)
                ctx.save();
                ctx.translate(-20, 0);
                let currentWag = Math.sin(this.tailWag);
                ctx.rotate(currentWag * 0.5); // 摆动控制
                
                ctx.fillStyle = this.secondaryColor;
                ctx.beginPath();
                ctx.moveTo(5, 0);
                // 上尾叶
                ctx.quadraticCurveTo(-15, -20, -35, -25);
                ctx.quadraticCurveTo(-25, 0, -10, 0);
                // 下尾叶
                ctx.quadraticCurveTo(-25, 0, -35, 25);
                ctx.quadraticCurveTo(-15, 20, 5, 0);
                ctx.fill();
                ctx.restore();

                // 画侧鳍
                ctx.save();
                ctx.fillStyle = this.color;
                // 左鳍
                ctx.save();
                ctx.translate(5, -12);
                ctx.rotate(Math.sin(this.finWag) * 0.3 - 0.5);
                ctx.beginPath();
                ctx.ellipse(0, -10, 4, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                
                // 右鳍
                ctx.save();
                ctx.translate(5, 12);
                ctx.rotate(-Math.sin(this.finWag) * 0.3 + 0.5);
                ctx.beginPath();
                ctx.ellipse(0, 10, 4, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                ctx.restore();

                // 画身体 (椭圆形)
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.ellipse(0, 0, 25, 15, 0, 0, Math.PI * 2);
                ctx.fill();

                // 眼睛
                ctx.shadowColor = 'transparent'; // 去除眼睛阴影
                
                // 白眼球
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(15, -8, 5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(15, 8, 5, 0, Math.PI*2); ctx.fill();

                // 黑眼珠
                ctx.fillStyle = '#111';
                ctx.beginPath(); ctx.arc(17, -8, 2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(17, 8, 2, 0, Math.PI*2); ctx.fill();

                ctx.restore();
            }
        }

        const fish = new Goldfish(width / 2, height / 2);

        // 动画循环
        function animate() {
            // 清除上一帧 (带轻微的透明度制造运动迷影效果)
            ctx.clearRect(0, 0, width, height);
            
            // 更新并绘制气泡
            for (let i = bubbles.length - 1; i >= 0; i--) {
                let b = bubbles[i];
                b.y -= b.speedY; // 气泡上升
                b.x += Math.sin(b.wobble) * 1.5; // 水平微微摆动
                b.wobble += 0.05;
                
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.lineWidth = 1;
                ctx.fill();
                ctx.stroke();

                // 气泡游出屏幕或者变太小就移除
                if (b.y < -10) {
                    bubbles.splice(i, 1);
                }
            }

            // 更新并绘制金鱼
            fish.update();
            fish.draw(ctx);

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
