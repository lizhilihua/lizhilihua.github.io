<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 交互金鱼 - 移动端适配版</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: radial-gradient(circle at center, #1a3a4a 0%, #05101a 100%); 
            touch-action: none; /* 防止页面在触摸时滚动 */
        }
        canvas { display: block; }
        #info { 
            position: absolute; 
            top: 20px; 
            width: 100%; 
            text-align: center; 
            color: rgba(255,255,255,0.5); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            pointer-events: none; 
            font-size: 14px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="info">触摸屏幕指引金鱼游动</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, fish;
    let targetPos = new THREE.Vector3(0, 0, 0);
    let pointer = new THREE.Vector2(0, 0);
    let parts = { tail: null, finL: null, finR: null };
    let isTouching = false;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        
        // 调整相机视角，适配竖屏
        const aspect = window.innerWidth / window.innerHeight;
        camera = new THREE.PerspectiveCamera(60, aspect, 0.1, 1000);
        camera.position.z = aspect < 1 ? 12 : 8; // 手机端距离拉远一点

        renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 限制像素比以优化性能
        document.body.appendChild(renderer.domElement);

        // 灯光
        const ambient = new THREE.AmbientLight(0x404040, 2.5); 
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 3);
        sun.position.set(5, 5, 10);
        scene.add(sun);

        // 构建金鱼
        fish = new THREE.Group();
        
        // 1. 鱼身 (Lathe)
        const points = [];
        for (let i = 0; i < 10; i++) {
            points.push(new THREE.Vector2(Math.sin(i * 0.35) * 1.2, (i - 5) * 0.8));
        }
        const bodyGeom = new THREE.LatheGeometry(points, 24); // 移动端减小分段数
        bodyGeom.rotateZ(Math.PI / 2);
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0xff8800, shininess: 80 });
        fish.add(new THREE.Mesh(bodyGeom, bodyMat));

        // 2. 鱼眼
        const eyeGeom = new THREE.SphereGeometry(0.2, 12, 12);
        const eyeMat = new THREE.MeshPhongMaterial({ color: 0x000000 });
        const eyeL = new THREE.Mesh(eyeGeom, eyeMat);
        eyeL.position.set(3, 0.3, 0.6);
        const eyeR = eyeL.clone();
        eyeR.position.z = -0.6;
        fish.add(eyeL, eyeR);

        // 3. 鳍与尾材质
        const finMat = new THREE.MeshPhongMaterial({ 
            color: 0xffaa44, 
            transparent: true, 
            opacity: 0.6, 
            side: THREE.DoubleSide 
        });

        // 4. 大尾巴 (Shape)
        const tailShape = new THREE.Shape();
        tailShape.moveTo(0, 0);
        tailShape.quadraticCurveTo(-1.5, 2, -3.5, 2.2);
        tailShape.quadraticCurveTo(-2.5, 0, -3.5, -2.2);
        tailShape.quadraticCurveTo(-1.5, -2, 0, 0);
        parts.tail = new THREE.Mesh(new THREE.ShapeGeometry(tailShape), finMat);
        parts.tail.position.set(-3.5, 0, 0);
        fish.add(parts.tail);

        // 5. 胸鳍
        const pectoralShape = new THREE.Shape();
        pectoralShape.moveTo(0, 0);
        pectoralShape.bezierCurveTo(0.5, 0.5, 1, 0.2, 0.8, -0.5);
        const pectoralGeom = new THREE.ShapeGeometry(pectoralShape);
        parts.finL = new THREE.Mesh(pectoralGeom, finMat);
        parts.finL.position.set(1.5, -0.5, 0.8);
        parts.finR = parts.finL.clone();
        parts.finR.position.z = -0.8;
        fish.add(parts.finL, parts.finR);

        scene.add(fish);

        // 交互监听：同时适配鼠标和触摸
        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchstart', handleInput, { passive: false });
        window.addEventListener('touchmove', handleInput, { passive: false });
        window.addEventListener('resize', onWindowResize);
    }

    function handleInput(e) {
        let x, y;
        if (e.touches) {
            // 触摸事件
            x = e.touches[0].clientX;
            y = e.touches[0].clientY;
            isTouching = true;
        } else {
            // 鼠标事件
            x = e.clientX;
            y = e.clientY;
        }

        pointer.x = (x / window.innerWidth) * 2 - 1;
        pointer.y = -(y / window.innerHeight) * 2 + 1;

        // 将归一化的屏幕坐标转换为 3D 空间坐标
        const aspect = window.innerWidth / window.innerHeight;
        targetPos.set(pointer.x * (aspect * 5), pointer.y * 5, 0);
    }

    function onWindowResize() {
        const aspect = window.innerWidth / window.innerHeight;
        camera.aspect = aspect;
        camera.position.z = aspect < 1 ? 12 : 8; // 竖屏拉远相机
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = Date.now() * 0.005;

        // 金鱼跟随逻辑
        fish.position.lerp(targetPos, 0.04);

        // 旋转逻辑：朝向目标点
        const diffX = targetPos.x - fish.position.x;
        const diffY = targetPos.y - fish.position.y;
        
        fish.rotation.y = THREE.MathUtils.lerp(fish.rotation.y, diffX * 0.2, 0.1);
        fish.rotation.z = THREE.MathUtils.lerp(fish.rotation.z, diffY * 0.1, 0.1);
        fish.rotation.x = Math.sin(t * 0.5) * 0.05;

        // 游动动画加速：如果正在触摸或距离较远，摆动频率加快
        const dist = fish.position.distanceTo(targetPos);
        const swimSpeed = 1 + Math.min(dist * 0.5, 3);
        
        if (parts.tail) {
            parts.tail.rotation.y = Math.sin(t * 2 * swimSpeed) * 0.4;
        }
        
        parts.finL.rotation.z = Math.sin(t * swimSpeed) * 0.3;
        parts.finR.rotation.z = -Math.sin(t * swimSpeed) * 0.3;

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
