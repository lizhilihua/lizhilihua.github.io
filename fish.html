<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>平滑皮肤仿真金鱼</title>
    <style>
        body { margin: 0; overflow: hidden; background: #05080a; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height, dpr;
let mouse = { x: 0, y: 0 };
let segments = [];
const numSegments = 20; 
const segLength = 7;

function init() {
    dpr = window.devicePixelRatio || 1;
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.scale(dpr, dpr);
    mouse.x = width / 2;
    mouse.y = height / 2;
    segments = Array.from({length: numSegments}, () => ({x: mouse.x, y: mouse.y, angle: 0, r: 0}));
}

window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; e.preventDefault(); }, {passive:false});

function draw() {
    ctx.fillStyle = "#05080a";
    ctx.fillRect(0, 0, width, height);

    const time = Date.now() * 0.005;

    // 1. 更新物理骨架
    segments[0].x += (mouse.x - segments[0].x) * 0.1;
    segments[0].y += (mouse.y - segments[0].y) * 0.1;

    for (let i = 1; i < numSegments; i++) {
        const seg = segments[i];
        const prev = segments[i-1];
        const dx = prev.x - seg.x;
        const dy = prev.y - seg.y;
        const angle = Math.atan2(dy, dx);
        seg.angle = angle;
        
        // 这里的摆动决定了游动的灵动感
        const swing = Math.sin(time - i * 0.4) * (i * 0.5);
        seg.x = prev.x - Math.cos(angle + swing * 0.04) * segLength;
        seg.y = prev.y - Math.sin(angle + swing * 0.04) * segLength;
        // 计算每一节的半径：头部圆润，身体厚实，尾部急剧收缩
        seg.r = i < 4 ? (i * 2 + 6) : Math.max(2, 16 - i * 0.8);
    }

    // 2. 绘制侧鳍 (放在身体下面)
    drawFin(segments[4], time);

    // 3. 【核心修改】绘制平滑皮肤路径
    // 我们计算每一节两侧的坐标，然后用曲线连接
    const leftPoints = [];
    const rightPoints = [];

    segments.forEach(seg => {
        leftPoints.push({
            x: seg.x + Math.cos(seg.angle + Math.PI/2) * seg.r,
            y: seg.y + Math.sin(seg.angle + Math.PI/2) * seg.r
        });
        rightPoints.push({
            x: seg.x + Math.cos(seg.angle - Math.PI/2) * seg.r,
            y: seg.y + Math.sin(seg.angle - Math.PI/2) * seg.r
        });
    });

    ctx.beginPath();
    ctx.moveTo(leftPoints[0].x, leftPoints[0].y);
    for(let i=1; i<numSegments; i++) ctx.lineTo(leftPoints[i].x, leftPoints[i].y);
    for(let i=numSegments-1; i>=0; i--) ctx.lineTo(rightPoints[i].x, rightPoints[i].y);
    ctx.closePath();

    const bodyGrad = ctx.createLinearGradient(segments[0].x, segments[0].y, segments[numSegments-1].x, segments[numSegments-1].y);
    bodyGrad.addColorStop(0, "#ff4500");
    bodyGrad.addColorStop(0.5, "#ff8c00");
    bodyGrad.addColorStop(1, "#e65100");
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // 4. 绘制大尾巴 (像薄纱一样)
    drawTail(segments[numSegments-1], time);

    // 5. 眼睛
    ctx.fillStyle = "white";
    const head = segments[0];
    [0.8, -0.8].forEach(side => {
        const ex = head.x + Math.cos(head.angle + side) * 8;
        const ey = head.y + Math.sin(head.angle + side) * 8;
        ctx.beginPath();
        ctx.arc(ex, ey, 4, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.arc(ex + Math.cos(head.angle)*1.5, ey + Math.sin(head.angle)*1.5, 2, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "white";
    });

    requestAnimationFrame(draw);
}

function drawFin(seg, time) {
    [1, -1].forEach(side => {
        ctx.save();
        ctx.translate(seg.x, seg.y);
        ctx.rotate(seg.angle + (Math.PI/2) * side + Math.sin(time)*0.3 * side);
        ctx.beginPath();
        ctx.ellipse(0, 5 * side, 12, 6, 0, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 69, 0, 0.5)";
        ctx.fill();
        ctx.restore();
    });
}

function drawTail(seg, time) {
    ctx.save();
    ctx.translate(seg.x, seg.y);
    ctx.rotate(seg.angle + Math.PI);
    const swing = Math.sin(time) * 0.5;
    
    ctx.beginPath();
    ctx.moveTo(0, 0);
    // 大扇形尾巴
    ctx.bezierCurveTo(20, 10 + swing*10, 40, 35 + swing*15, 60, 25);
    ctx.lineTo(50, 0);
    ctx.lineTo(60, -25);
    ctx.bezierCurveTo(40, -35 - swing*15, 20, -10 - swing*10, 0, 0);
    
    const tailGrad = ctx.createLinearGradient(0, 0, 60, 0);
    tailGrad.addColorStop(0, "rgba(255, 69, 0, 0.7)");
    tailGrad.addColorStop(1, "rgba(255, 140, 0, 0)");
    ctx.fillStyle = tailGrad;
    ctx.fill();
    ctx.restore();
}

init();
draw();
window.addEventListener('resize', init);
</script>
</body>
</html>
